<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SolarView - 探索太阳系</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>

      <div id="hudTopLeft">
        <h1>SolarView</h1>
        <p id="hint">PC: 左键旋转 / 滚轮缩放 / Shift+左键平移；移动端: 单指旋转 / 双指缩放 / 三指平移</p>
      </div>

      <div id="audioStatus" class="glass">
        <span id="audioText">音频：未播放</span>
        <button id="muteBtn" type="button" aria-label="静音切换">静音</button>
      </div>

      <div id="infoPanel" class="glass hidden" role="dialog" aria-modal="false">
        <button id="closeInfo" type="button" aria-label="关闭">×</button>
        <h2 id="infoTitle"></h2>
        <p id="infoHighlight" class="highlightBadge"></p>
        <p id="infoSummary"></p>
        <ul id="infoFacts"></ul>
        <p id="audioNote"></p>
        <p class="sourceNote" id="infoSources"></p>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
