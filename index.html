<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SolarView - 探索太阳系</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>

      <div id="hudTopLeft">
        <h1>SolarView</h1>
        <p id="hint">点击太阳、行星或重要卫星，进入视角并查看 NASA 信息</p>
      </div>

      <div id="controlsPanel" aria-label="相机控制面板">
        <div class="controlGroup">
          <div class="groupTitle">平移</div>
          <div class="pad">
            <button data-action="pan-up" aria-label="平移上">⬆️</button>
            <button data-action="pan-left" aria-label="平移左">⬅️</button>
            <button data-action="pan-down" aria-label="平移下">⬇️</button>
            <button data-action="pan-right" aria-label="平移右">➡️</button>
          </div>
        </div>

        <div class="controlGroup">
          <div class="groupTitle">旋转视角</div>
          <div class="pad">
            <button data-action="look-up" aria-label="向上看">上</button>
            <button data-action="look-left" aria-label="向左看">左</button>
            <button data-action="look-down" aria-label="向下看">下</button>
            <button data-action="look-right" aria-label="向右看">右</button>
          </div>
        </div>
      </div>

      <div id="audioStatus" class="glass">
        <span id="audioText">音频：未播放</span>
        <button id="muteBtn" type="button" aria-label="静音切换">静音</button>
      </div>

      <div id="infoPanel" class="glass hidden" role="dialog" aria-modal="false">
        <button id="closeInfo" type="button" aria-label="关闭">×</button>
        <h2 id="infoTitle"></h2>
        <p id="infoHighlight" class="highlightBadge"></p>
        <p id="infoSummary"></p>
        <ul id="infoFacts"></ul>
        <p id="audioNote"></p>
        <p class="sourceNote" id="infoSources"></p>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
